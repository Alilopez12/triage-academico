openapi: 3.0.0
info:
  title: API Sistema de Triage Académico
  version: 1.0.0
  description: API para gestionar solicitudes académicas y su ciclo de vida.

servers:
  - url: http://localhost:8080

paths:

  /solicitudes:
    post:
      summary: Crear una nueva solicitud
      operationId: crearSolicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolicitudCreate'
      responses:
        '201':
          description: Solicitud creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '400':
          description: Datos inválidos

    get:
      summary: Listar solicitudes
      operationId: listarSolicitudes
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Solicitud'

  /solicitudes/{id}:
    get:
      summary: Obtener una solicitud por id
      operationId: obtenerSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '404':
          description: Solicitud no encontrada

  /solicitudes/{id}/clasificar:
    patch:
      summary: Cambiar estado de REGISTRADA a CLASIFICADA
      operationId: clasificarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud clasificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '409':
          description: Transición de estado no permitida

  /solicitudes/{id}/iniciar-atencion:
    patch:
      summary: Cambiar estado de CLASIFICADA a EN_ATENCION
      operationId: iniciarAtencion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Atención iniciada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '409':
          description: Transición de estado no permitida

  /solicitudes/{id}/marcar-atendida:
    patch:
      summary: Cambiar estado de EN_ATENCION a ATENDIDA
      operationId: marcarAtendida
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud atendida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '409':
          description: Transición de estado no permitida

  /solicitudes/{id}/cerrar:
    patch:
      summary: Cambiar estado de ATENDIDA a CERRADA
      operationId: cerrarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '409':
          description: Transición de estado no permitida


components:

  schemas:

    Solicitud:
      type: object
      properties:
        id:
          type: integer
        descripcion:
          type: string
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        prioridad:
          $ref: '#/components/schemas/Prioridad'
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
      required:
        - id
        - descripcion
        - estado

    SolicitudCreate:
      type: object
      properties:
        descripcion:
          type: string
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
      required:
        - descripcion
        - canalOrigen

    EstadoSolicitud:
      type: string
      description: Estados del ciclo de vida de una solicitud
      enum:
        - REGISTRADA
        - CLASIFICADA
        - EN_ATENCION
        - ATENDIDA
        - CERRADA

    TipoSolicitud:
      type: string
      enum:
        - REGISTRO_ASIGNATURA
        - HOMOLOGACION
        - CANCELACION
        - CUPOS
        - CONSULTA

    Prioridad:
      type: string
      enum:
        - BAJA
        - MEDIA
        - ALTA

    CanalOrigen:
      type: string
      enum:
        - PRESENCIAL
        - CORREO
        - SAC
        - CSU
        - TELEFONICO