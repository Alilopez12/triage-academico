openapi: 3.0.0
info:
  title: API Sistema de Triage Académico
  version: 1.0.0
  description: API para gestionar solicitudes académicas y su ciclo de vida.

servers:
  - url: http://localhost:8080

paths:

  /solicitudes:
    post:
      summary: Registrar una nueva solicitud
      operationId: crearSolicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolicitudCreate'
      responses:
        '201':
          description: Solicitud creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'

    get:
      summary: Listar solicitudes con filtros
      operationId: listarSolicitudes
      parameters:
        - name: estado
          in: query
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
        - name: tipoSolicitud
          in: query
          schema:
            $ref: '#/components/schemas/TipoSolicitud'
        - name: prioridad
          in: query
          schema:
            $ref: '#/components/schemas/Prioridad'
        - name: responsableId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Solicitud'

  /solicitudes/{id}:
    get:
      summary: Obtener detalle de una solicitud
      operationId: obtenerSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '404':
          description: Solicitud no encontrada

  /solicitudes/{id}/clasificar:
    patch:
      summary: Cambiar estado de REGISTRADA a CLASIFICADA
      operationId: clasificarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud clasificada
        '409':
          description: Transición inválida

  /solicitudes/{id}/priorizar:
    patch:
      summary: Asignar prioridad a una solicitud
      operationId: priorizarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriorizarSolicitud'
      responses:
        '200':
          description: Prioridad asignada

  /solicitudes/{id}/asignar:
    patch:
      summary: Asignar responsable a una solicitud
      operationId: asignarResponsable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarResponsable'
      responses:
        '200':
          description: Responsable asignado

  /solicitudes/{id}/iniciar-atencion:
    patch:
      summary: Cambiar estado de CLASIFICADA a EN_ATENCION
      operationId: iniciarAtencion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Atención iniciada

  /solicitudes/{id}/marcar-atendida:
    patch:
      summary: Cambiar estado de EN_ATENCION a ATENDIDA
      operationId: marcarAtendida
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud atendida

  /solicitudes/{id}/cerrar:
    patch:
      summary: Cerrar solicitud
      operationId: cerrarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierreSolicitud'
      responses:
        '200':
          description: Solicitud cerrada

  /solicitudes/{id}/historial:
    get:
      summary: Consultar historial de la solicitud
      operationId: obtenerHistorial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Historial de acciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialItem'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:

    Solicitud:
      type: object
      properties:
        id:
          type: integer
        descripcion:
          type: string
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        fechaRegistro:
          type: string
          format: date-time
        identificacionSolicitante:
          type: string
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
        prioridad:
          $ref: '#/components/schemas/Prioridad'
        responsableId:
          type: integer
        historial:
          type: array
          items:
          $ref: '#/components/schemas/HistorialItem'

    SolicitudCreate:
      type: object
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        descripcion:
          type: string
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        identificacionSolicitante:
          type: string
      required:
        - tipoSolicitud
        - descripcion
        - canalOrigen
        - identificacionSolicitante

    PriorizarSolicitud:
      type: object
      properties:
        prioridad:
          $ref: '#/components/schemas/Prioridad'
        impactoAcademico:
          $ref: '#/components/schemas/ImpactoAcademico'
        fechaLimite:
          type: string
          format: date
        justificacion:
          type: string
      required:
        - prioridad
        - justificacion

    AsignarResponsable:
      type: object
      properties:
        responsableId:
          type: integer
      required:
        - responsableId

    CierreSolicitud:
      type: object
      properties:
        observacionCierre:
          type: string
      required:
        - observacionCierre

    HistorialItem:
      type: object
      properties:
        fechaHora:
          type: string
          format: date-time
        accion:
          type: string
        usuarioResponsableId:
          type: integer
        observacion:
          type: string

    EstadoSolicitud:
      type: string
      enum:
        - REGISTRADA
        - CLASIFICADA
        - EN_ATENCION
        - ATENDIDA
        - CERRADA

    TipoSolicitud:
      type: string
      enum:
        - REGISTRO_ASIGNATURAS
        - HOMOLOGACION
        - CANCELACION_ASIGNATURAS
        - SOLICITUD_CUPOS
        - CONSULTA_ACADEMICA

    Prioridad:
      type: string
      enum:
        - BAJA
        - MEDIA
        - ALTA
        - CRITICA

    ImpactoAcademico:
      type: string
      enum:
        - BAJO
        - MEDIO
        - ALTO

    CanalOrigen:
      type: string
      enum:                 
        - PRESENCIAL
        - CORREO
        - SAC
        - CSU
        - TELEFONICO